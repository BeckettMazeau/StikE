; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1-n16r8v]
platform = espressif32
board = esp32-s3-devkitc-1-n16r8v
framework = arduino
lib_deps = 
	bodmer/TFT_eSPI@^2.5.43
	zinggjm/GxEPD2@^1.6.8
	adafruit/Adafruit GFX Library@^1.12.6
	adafruit/Adafruit BusIO@^1.16.1
	bblanchon/ArduinoJson@^6.21.3
monitor_speed = 115200
upload_speed = 921600
; These two lines are vital for S3 Serial stability
monitor_dtr = 0
monitor_rts = 0
monitor_filters = esp32_exception_decoder
build_flags = 
	-O2
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D CORE_DEBUG_LEVEL=5
	; --- TFT_eSPI Configuration (ST7735S) ---
	; Mirrors DualDisplayTest/User_Setup.h exactly (that setup is confirmed working on this hardware).
	; USER_SETUP_LOADED=1 tells User_Setup_Select.h to skip its #include and trust these flags.
	; HSPI puts the TFT on SPI3; the ePaper uses the global SPI (FSPI/SPI2) so the two buses don't clash.
	-D USER_SETUP_LOADED=1
	-D DISABLE_ALL_LIBRARY_WARNINGS
	-D ST7735_DRIVER=1
	-D ST7735_GREENTAB2
	-D TFT_RGB_ORDER=TFT_RGB
	-D TFT_WIDTH=128
	-D TFT_HEIGHT=160
	-D TFT_MISO=8
	-D TFT_MOSI=11
	-D TFT_SCLK=12
	-D TFT_CS=10
	-D TFT_DC=9
	-D TFT_RST=13
	-D TFT_BL=42
	-D TFT_BACKLIGHT_ON=HIGH
	-D LOAD_GLCD
	-D LOAD_FONT2
	-D LOAD_FONT4
	-D LOAD_FONT6
	-D LOAD_FONT7
	-D LOAD_FONT8
	-D LOAD_GFXFF
	-D SMOOTH_FONT
	-D SPI_FREQUENCY=27000000
	-D SPI_READ_FREQUENCY=20000000
	-D USE_HSPI_PORT
	-D TFT_HSPI
	; --- GxEPD2 Configuration ---
	-D GxEPD2_DISPLAY_CLASS=Generic_EPD
	-D GxEPD2_DRIVER_CLASS=GxEPD2_213_B74
	; --- SYSTEMS TEST ACTIVATION ---
	; Uncomment to run the interactive hardware diagnostics harness instead of the real UI.
	;-D STike_SYSTEM_TEST
	; Uncomment to disable ePaper updates during TFT diagnostics (reduces SPI bus contention)
	; -D DIAG_UI_ONLY
